<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="20" cy="20" r="18" fill="url(#purpleGrad)" filter="url(#glow)" opacity="0.15"/>
  <!-- Play button triangle -->
  <polygon points="15,12 30,20 15,28" fill="url(#purpleGrad)" filter="url(#glow)"/>
  <!-- Live dot indicator -->
  <circle cx="10" cy="12" r="3" fill="#A855F7" opacity="0.9"/>
  <!-- Signal waves -->
  <path d="M6 8 Q10 12 6 16" stroke="#7C3AED" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M3 5.5 Q10 12 3 18.5" stroke="#A855F7" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
</svg>
