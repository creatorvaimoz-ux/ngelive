<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Icon group -->
  <g transform="translate(4, 4)">
    <!-- Background circle subtle -->
    <circle cx="16" cy="16" r="14" fill="#7C3AED" opacity="0.12"/>
    <!-- Play button triangle -->
    <polygon points="11,9 24,16 11,23" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <!-- Live dot indicator -->
    <circle cx="7" cy="9" r="2.5" fill="#A855F7"/>
    <!-- Signal waves -->
    <path d="M3.5 6 Q7 9 3.5 12" stroke="#7C3AED" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M1 3.5 Q7 9 1 14.5" stroke="#A855F7" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>
  <!-- Text "ngelive" -->
  <text x="42" y="27" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="-0.5" fill="white">ngeli</text>
  <text x="95" y="27" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="-0.5" fill="url(#purpleGrad)">ve</text>
</svg>
